<!DOCTYPE html>
<html>

<head>
	<link href='https://fonts.googleapis.com/css?family=VT323' rel='stylesheet' type='text/css'>

	<meta charset="utf-8">
	<title>Red from Pallet</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.12.2/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>
	<style>
* {
    font-family: 'VT323', monospace;
}

body {
    padding: 16px 0 32px;
}

/* --- Header --- */
.site-header {
    margin-bottom: 8px;
}

#logo {
    margin-top: 0.3em;
    height: 80px;
}

.header-text {
    padding-top: 8px;
}

h1, h4 {
    width: auto;
    margin: 0;
}

.header-text h1 {
    font-size: 36px;
    line-height: 1.1;
    margin-bottom: 4px;
}

.header-text h4 {
    font-size: 20px;
    color: #666;
}

hr {
    margin-top: 12px;
    margin-bottom: 20px;
}

/* --- Hero --- */
.hero {
    margin-bottom: 20px;
    text-align: center;
}

#banner {
    max-width: 100%;
    height: auto;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    border: 1px solid #ddd;
    padding: 4px;
    background: #fff;
}

/* --- Section heading --- */
.section-title {
    margin-bottom: 16px;
}

.section-title h3 {
    font-size: 28px;
    letter-spacing: 1px;
    margin: 0;
}

.btn-share {
    background: #3070d0;
    border-color: #1f50a0;
    color: #fff;
}

.btn-share:hover,
.btn-share:focus {
    background: #2560b8;
    border-color: #143c80;
    color: #fff;
}

.share-toast {
    float: left;
    font-size: 16px;
    color: #2a8a2a;
    line-height: 36px;
    opacity: 0;
    transition: opacity 0.2s ease;
}

.share-toast.visible {
    opacity: 1;
}

/* --- Starter cards (mobile-first defaults) --- */
.starters {
    margin-bottom: 16px;
}

.starter {
    padding: 12px;
    text-align: center;
    margin-bottom: 16px;
}

.starter-name {
    margin-top: 12px;
    margin-bottom: 4px;
    font-size: 26px;
}

.starter-link {
    display: block;
    font-size: 16px;
    word-break: break-all;
}

.thumbnail {
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-bottom: 0;
    padding: 8px;
}

.img-pokemon {
    opacity: 0.6;
    transition: opacity 0.2s ease;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    height: 180px;
    width: auto;
    max-width: 100%;
}

.img-pokemon:active,
.img-pokemon:hover {
    opacity: 1;
}

/* --- Desktop: fit everything in one viewport, no page scroll --- */
@media (min-width: 992px) and (min-height: 700px) {
    html, body {
        height: 100%;
        overflow: hidden;
    }

    body {
        padding: 12px 0;
        display: flex;
        flex-direction: column;
    }

    .container {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    .site-header { flex: 0 0 auto; margin-bottom: 0; }
    #logo { height: 60px; }
    .header-text { padding-top: 4px; }
    .header-text h1 { font-size: 32px; }
    .header-text h4 { font-size: 18px; }

    hr { margin-top: 8px; margin-bottom: 12px; }

    .hero { margin-bottom: 12px; flex: 0 1 auto; min-height: 0; }
    #banner { max-height: 24vh; width: auto; }

    .section-title { margin-bottom: 10px; flex: 0 0 auto; }
    .section-title h3 { font-size: 26px; }

    .starters { margin-bottom: 0; flex: 1 1 auto; min-height: 0; }

    .starter {
        padding: 8px;
        margin-bottom: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
    }

    .starter-name { margin-top: 8px; font-size: 24px; }

    .thumbnail { height: 36vh; padding: 8px; }
    .img-pokemon { height: 32vh; opacity: 0.4; }
}

.img-pokemon:hover {
    opacity: 1;
}

/* --- Modal --- */
.modal-content {
    font-size: 20px;
}

.modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
}

.modal-title {
    font-size: 32px;
    flex: 1;
    text-align: center;
    margin: 0;
}

.nav-arrow {
    background: transparent;
    border: 2px solid #999;
    border-radius: 4px;
    width: 44px;
    height: 44px;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    color: #333;
    flex: 0 0 auto;
}

.nav-arrow:hover {
    background: #f0f0f0;
    border-color: #333;
}

.modal-body {
    padding: 24px 28px;
    font-size: 20px;
}

.modal-sprite {
    width: 200px;
    height: auto;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    margin-bottom: 16px;
}

.quick-info {
    display: flex;
    justify-content: space-around;
    align-items: stretch;
    border: 1px solid #ddd;
    border-radius: 6px;
    margin: 16px 0 20px;
    padding: 10px 0;
    background: #fafafa;
}

.quick-cell {
    flex: 1;
    text-align: center;
    padding: 0 10px;
    border-right: 1px dashed #ddd;
}

.quick-cell:last-child {
    border-right: none;
}

.quick-label {
    display: block;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    margin-bottom: 4px;
}

.quick-value {
    display: block;
    font-size: 20px;
    font-weight: bold;
}

.poke-types {
    margin: 0;
}

.type-badge {
    display: inline-block;
    padding: 2px 10px;
    margin: 0 2px;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #fff;
    border-radius: 4px;
    border: 1px solid rgba(0, 0, 0, 0.2);
}

.type-fire   { background: #f08030; }
.type-water  { background: #6890f0; }
.type-grass  { background: #78c850; }
.type-poison { background: #a040a0; }

.pokedex-entry {
    font-size: 22px;
    line-height: 1.4;
    margin-bottom: 20px;
}

.info-group {
    width: 80%;
    max-width: 360px;
    margin: 0 auto 20px;
}

.info-group:last-child {
    margin-bottom: 0;
}

.group-title {
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    border-bottom: 1px solid #ddd;
    padding-bottom: 6px;
    margin: 0 0 10px;
}

.info-grid {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 6px 16px;
    margin: 0;
    font-size: 20px;
}

.info-grid dt {
    color: #555;
    font-weight: normal;
    text-transform: uppercase;
}

.info-grid dd {
    margin: 0;
    text-align: right;
    font-weight: bold;
}

.stats-table {
    width: 100%;
    margin: 0;
    font-size: 20px;
}

.stats-table th {
    text-align: left;
    padding: 4px 12px 4px 0;
    color: #555;
    font-weight: normal;
    text-transform: uppercase;
    width: 50%;
}

.stats-table td {
    text-align: right;
    padding: 4px 0;
    font-weight: bold;
}

.stats-table tr + tr th,
.stats-table tr + tr td {
    border-top: 1px dashed #ddd;
}

.modal-footer {
    padding: 16px 20px;
}

.modal-footer .btn {
    font-size: 18px;
    padding: 8px 18px;
}

.btn-choose {
    background: #d03030;
    border-color: #a02020;
    color: #fff;
}

.btn-choose:hover,
.btn-choose:focus {
    background: #b02525;
    border-color: #801515;
    color: #fff;
}

.starter.is-chosen {
    background: #fff8e1;
    border: 2px solid #d03030;
    border-radius: 8px;
}

.starter.is-chosen .img-pokemon {
    opacity: 1;
}

.chosen-pct {
    text-align: center;
    font-size: 18px;
    color: #888;
    margin: 4px 0 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.starter.is-chosen .chosen-pct {
    color: #d03030;
    font-weight: bold;
}

	</style>
</head>

	var currentIndex = 0;

	// Randomize starter card order on every page load.
	$(function () {
		var $row = $(".starters");
		var $cards = $row.children(".starter").get();
		for (var i = $cards.length - 1; i > 0; i--) {
			var j = Math.floor(Math.random() * (i + 1));
			var tmp = $cards[i]; $cards[i] = $cards[j]; $cards[j] = tmp;
		}
		$row.append($cards);

		// Always render counts so users see the % even before they choose.
		renderPercentages();

		// Restore prior choice from localStorage, if any.
		try {
			var prior = localStorage.getItem("chosenStarter");
			if (prior) {
				var p = POKEMON[indexOfId(prior)];
				if (p && p.id === prior) {
					$("#section-heading").text("You chose " + p.name + "!");
					$(".img-pokemon[data-poke='" + p.id + "']").closest(".starter").addClass("is-chosen");
				}
			}
		} catch (e) {}
	});

	function renderPokemon(i) {
		var p = POKEMON[i];
		currentIndex = i;
		var $m = $("#pokeModal");
		$m.find(".modal-title").text(p.name);
		$m.find(".modal-sprite").attr("src", p.sprite).attr("alt", p.name);
		var $types = $m.find(".poke-types").empty();
		p.types.forEach(function (t) {
			$types.append($("<span>").addClass("type-badge type-" + t.toLowerCase()).text(t));
		});
		$m.find(".pokedex-entry").text(p.entry);
		$m.find(".stat-height").text(p.height);
		$m.find(".stat-weight").text(p.weight);
		$m.find(".stat-hp").text(p.stats.hp);
		$m.find(".stat-atk").text(p.stats.atk);
		$m.find(".stat-def").text(p.stats.def);
		$m.find(".stat-spc").text(p.stats.spc);
		$m.find(".stat-spe").text(p.stats.spe);
		var $choose = $m.find(".btn-choose");
		var $share = $m.find(".btn-share");
		if (hasChosen()) {
			$choose.hide();
			$share.show();
		} else {
			$choose.show().text("Choose " + p.name);
			$share.hide();
		}
	}

	function hasChosen() {
		try { return !!localStorage.getItem("chosenStarter"); } catch (e) { return false; }
	}

	// Global counts are stored on abacus.jasoncameron.dev — a free public
	// hit-counter API. Each starter id is a key in the namespace below.
	var COUNTER_NS = "pokeredfrompallet-ghpages";
	var COUNTER_URL = "https://abacus.jasoncameron.dev";

	function fetchCount(id) {
		return fetch(COUNTER_URL + "/get/" + COUNTER_NS + "/" + id)
			.then(function (r) { return r.ok ? r.json() : { value: 0 }; })
			.then(function (j) { return (j && typeof j.value === "number") ? j.value : 0; })
			.catch(function () { return 0; });
	}

	function hitCount(id) {
		return fetch(COUNTER_URL + "/hit/" + COUNTER_NS + "/" + id)
			.then(function (r) { return r.ok ? r.json() : { value: 0 }; })
			.catch(function () { return { value: 0 }; });
	}

	function renderPercentages() {
		// Only reveal percentages after the current user has made their choice.
		if (!hasChosen()) {
			$(".chosen-pct").text("");
			return Promise.resolve();
		}
		$(".chosen-pct").text("…"); // loading indicator while we fetch
		return Promise.all(POKEMON.map(function (p) { return fetchCount(p.id); }))
			.then(function (values) {
				var total = values.reduce(function (s, v) { return s + v; }, 0);
				POKEMON.forEach(function (p, i) {
					var pct = total === 0 ? 0 : Math.round((values[i] / total) * 100);
					var label = total === 0 ? "—" : "Chosen by " + pct + "%";
					$(".img-pokemon[data-poke='" + p.id + "']")
						.closest(".starter")
						.find(".chosen-pct")
						.text(label);
				});
			});
	}

	function choosePokemon(p) {
		if (hasChosen()) return;
		try { localStorage.setItem("chosenStarter", p.id); } catch (e) {}
		$("#section-heading").text("You chose " + p.name + "!");
		$(".starter").removeClass("is-chosen");
		$(".img-pokemon[data-poke='" + p.id + "']").closest(".starter").addClass("is-chosen");
		hitCount(p.id).then(renderPercentages);
	}

	function indexOfId(id) {
		for (var i = 0; i < POKEMON.length; i++) {
			if (POKEMON[i].id === id) return i;
		}
		return 0;
	}

	$(document).on("click", ".img-pokemon", function () {
		renderPokemon(indexOfId($(this).data("poke")));
	});

	$(document).on("click", ".btn-choose", function () {
		choosePokemon(POKEMON[currentIndex]);
	});

	$(document).on("click", ".nav-prev", function () {
		renderPokemon((currentIndex - 1 + POKEMON.length) % POKEMON.length);
	});

	$(document).on("click", ".nav-next", function () {
		renderPokemon((currentIndex + 1) % POKEMON.length);
	});

	function buildShareData() {
		var url = window.location.href.split("#")[0];
		var chosenId = null;
		try { chosenId = localStorage.getItem("chosenStarter"); } catch (e) {}
		var chosen = chosenId ? POKEMON[indexOfId(chosenId)] : null;
		var text = chosen
			? "I chose " + chosen.name + " as my starter! Which one will you pick?"
			: "Pick your Pokemon starter — Charmander, Squirtle, or Bulbasaur?";
		return { title: "Red from Pallet", text: text, url: url };
	}

	function showToast(msg) {
		var $t = $("#share-toast").text(msg).addClass("visible");
		clearTimeout(showToast._h);
		showToast._h = setTimeout(function () { $t.removeClass("visible"); }, 2200);
	}

	$(document).on("click", "#btn-share", function () {
		var data = buildShareData();
		if (navigator.share) {
			navigator.share(data).catch(function () { /* user cancelled */ });
		} else if (navigator.clipboard && navigator.clipboard.writeText) {
			navigator.clipboard.writeText(data.text + " " + data.url)
				.then(function () { showToast("Link copied to clipboard!"); })
				.catch(function () { showToast("Copy failed — " + data.url); });
		} else {
			window.prompt("Copy this link to share:", data.url);
		}
	});

	// Arrow keys cycle when modal is open.
	$(document).on("keydown", function (e) {
		if (!$("#pokeModal").hasClass("in")) return;
		if (e.which === 37) renderPokemon((currentIndex - 1 + POKEMON.length) % POKEMON.length);
		if (e.which === 39) renderPokemon((currentIndex + 1) % POKEMON.length);
	});
</script>
